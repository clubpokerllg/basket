<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de Score Basket - Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --team-a-color: #E63946;
    --team-b-color: #1D3557;
    --accent: #F4A261;
    --bg: #0a0a0f;
    --panel: #13131a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f0;
    --muted: #888;
    /* Variables dynamiques */
    --logo-size: 120px;
    --img-scale: 100%;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 40%, rgba(230,57,70,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 80% 60%, rgba(29,53,87,0.12) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 1000px;
    padding: 20px;
  }

  .league-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    letter-spacing: 0.15em;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
  }

  .league-bar span { color: var(--accent); }

  .league-bar::before, .league-bar::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .scoreboard {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }

  .info-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 60px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }

  .info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 100px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 600;
  }

  .info-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.05em;
    color: var(--text);
    line-height: 1;
    text-align: center;
  }

  .timer-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 120px;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #22c55e;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1.4s ease-in-out infinite;
  }

  .live-dot.paused { background: #e63946; animation: none; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .score-area {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    padding: 40px 32px;
    align-items: center;
  }

  .team { display: flex; flex-direction: column; align-items: center; gap: 14px; }

  .team-logo {
    width: var(--logo-size);
    height: var(--logo-size);
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: width 0.2s, height 0.2s;
  }

  .team-logo img { 
    width: var(--img-scale); 
    height: var(--img-scale); 
    object-fit: contain; 
    transition: width 0.2s, height 0.2s;
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.08em;
  }

  .score-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 100px;
    line-height: 1;
    min-width: 110px;
    text-align: center;
  }

  .score-a { color: var(--team-a-color); }
  .score-b { color: #7fafd6; }

  .controls, .extra-controls {
    background: rgba(0,0,0,0.3);
    border-top: 1px solid var(--border);
    padding: 24px;
  }

  .grid-controls { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .grid-settings { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
    text-transform: uppercase;
  }

  .btn-main { background: var(--accent); color: #000; width: 100%; margin-top: 10px; font-size: 16px; }
  .btn-add-a { background: var(--team-a-color); color: #fff; }
  .btn-add-b { background: var(--team-b-color); color: #fff; }
  .btn-sub { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
  
  .input-group { display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; }
  
  select, input {
    background: #1a1a24;
    border: 1px solid var(--border);
    color: #fff;
    padding: 8px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 13px;
  }

  input[type="range"] { cursor: pointer; accent-color: var(--accent); }

  .quarter-chip {
    background: rgba(255,255,255,0.05);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    margin: 2px;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="container">
  <div class="league-bar"><span>🏀</span> Match Actuel <span>🏀</span></div>

  <div class="scoreboard">
    <!-- INFO BAR -->
    <div class="info-bar">
      <div class="info-item">
        <span class="info-label">Tournoi</span>
        <span class="info-value" id="display-tournament">8eme</span>
      </div>
      
      <div class="timer-container">
        <span class="info-label"><span id="timer-dot" class="live-dot paused"></span> Temps</span>
        <span class="info-value" id="display-timer">07:00</span>
        <button class="btn btn-main" id="timer-btn" onclick="toggleTimer()">Démarrer</button>
      </div>

      <div class="info-item">
        <span class="info-label">Période</span>
        <span class="info-value" id="display-quarter">Q1</span>
      </div>
    </div>

    <!-- SCORE AREA -->
    <div class="score-area">
      <div class="team">
        <div class="team-logo"><img src="HB.png" id="img-logo-a" alt="Logo A"></div>
        <div class="team-name" id="display-name-a" style="color:var(--team-a-color)">EQUIPE A</div>
        <div class="info-label">Fautes: <span id="fouls-a-val" style="color:#fff">0</span></div>
      </div>

      <div style="text-align:center">
        <div style="display:flex; align-items:center;">
          <span class="score-num score-a" id="score-a">0</span>
          <span style="font-size:40px; opacity:0.3; margin:0 15px">—</span>
          <span class="score-num score-b" id="score-b">0</span>
        </div>
        <div id="quarter-scores-display"></div>
      </div>

      <div class="team">
        <div class="team-logo"><img src="H4.png" id="img-logo-b" alt="Logo B"></div>
        <div class="team-name" id="display-name-b" style="color:#7fafd6">EQUIPE B</div>
        <div class="info-label">Fautes: <span id="fouls-b-val" style="color:#fff">0</span></div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="grid-controls">
        <div>
          <label id="lbl-a">Equipe A</label>
          <div style="display:flex; gap:5px; margin-top:5px">
            <button class="btn btn-add-a" onclick="addScore('a',1)">+1</button>
            <button class="btn btn-add-a" onclick="addScore('a',2)">+2</button>
            <button class="btn btn-add-a" onclick="addScore('a',3)">+3</button>
            <button class="btn btn-sub" onclick="addScore('a',-1)">-1</button>
            <button class="btn btn-sub" onclick="addFoul('a')">Faute</button>
          </div>
        </div>
        <div>
          <label id="lbl-b">Equipe B</label>
          <div style="display:flex; gap:5px; margin-top:5px">
            <button class="btn btn-add-b" onclick="addScore('b',1)">+1</button>
            <button class="btn btn-add-b" onclick="addScore('b',2)">+2</button>
            <button class="btn btn-add-b" onclick="addScore('b',3)">+3</button>
            <button class="btn btn-sub" onclick="addScore('b',-1)">-1</button>
            <button class="btn btn-sub" onclick="addFoul('b')">Faute</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="extra-controls">
      <div class="grid-settings">
        <!-- EQUIPE A -->
        <div class="input-group">
          <label>Equipe A</label>
          <select onchange="updateLogo('a', this.value)">
            <option value="HB">HB</option>
            <option value="H4" selected>H4</option>
            <option value="JD">JD</option>
            <option value="JDS">JDS</option>
            <option value="JF">JF</option>
            <option value="LLG">LLG</option>
            <option value="Mon">Mon</option>
            <option value="Tur">Tur</option>
          </select>
          <input type="text" placeholder="Nom" oninput="updateName('a', this.value)">
        </div>

        <!-- EQUIPE B -->
        <div class="input-group">
          <label>Equipe B</label>
          <select onchange="updateLogo('b', this.value)">
            <option value="HB">HB</option>
            <option value="H4">H4</option>
            <option value="JD" selected>JD</option>
            <option value="JDS">JDS</option>
            <option value="JF">JF</option>
            <option value="LLG">LLG</option>
            <option value="Mon">Mon</option>
            <option value="Tur">Tur</option>
          </select>
          <input type="text" placeholder="Nom" oninput="updateName('b', this.value)">
        </div>

        <!-- MATCH & TIME -->
        <div class="input-group">
          <label>Match / Chrono</label>
          <input type="text" placeholder="Ex: FINALE" oninput="updateTournament(this.value)">
          <div style="display:flex; gap:5px; margin-top:5px">
            <input type="text" id="manual-timer" value="07:00" style="width:60px">
            <button class="btn btn-sub" onclick="setManualTime()" style="font-size:10px">OK</button>
          </div>
          <select id="q-select" onchange="changeQuarter(this.value)" style="margin-top:5px">
            <option value="Q1">Q1</option><option value="Q2">Q2</option>
            <option value="Q3">Q3</option><option value="Q4">Q4</option>
          </select>
        </div>

        <!-- SIZE CONTROLS -->
        <div class="input-group">
          <label>Cercle (<span id="size-label">120</span>px)</label>
          <input type="range" min="50" max="300" value="120" oninput="resizeLogos(this.value)">
          <label style="margin-top:8px">Zoom Logo (<span id="zoom-label">80</span>%)</label>
          <input type="range" min="10" max="300" value="80" oninput="rescaleImages(this.value)">
          <button class="btn btn-sub" style="margin-top:10px; font-size:10px" onclick="location.reload()">Reset Global</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let state = {
    scoreA: 0, scoreB: 0,
    foulsA: 0, foulsB: 0,
    timeLeft: 420, 
    timerRunning: false,
    interval: null,
    quarter: 'Q1',
    history: { Q1: [0,0] }
  };

  function toggleTimer() {
    const btn = document.getElementById('timer-btn');
    const dot = document.getElementById('timer-dot');
    if (state.timerRunning) {
      clearInterval(state.interval);
      btn.textContent = "Démarrer";
      dot.classList.add('paused');
    } else {
      state.interval = setInterval(updateTimer, 1000);
      btn.textContent = "Pause";
      dot.classList.remove('paused');
    }
    state.timerRunning = !state.timerRunning;
  }

  function updateTimer() {
    if (state.timeLeft <= 0) {
      clearInterval(state.interval);
      state.timerRunning = false;
      document.getElementById('timer-btn').textContent = "Terminé";
      return;
    }
    state.timeLeft--;
    displayTime();
  }

  function displayTime() {
    const mins = Math.floor(state.timeLeft / 60);
    const secs = state.timeLeft % 60;
    const format = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    document.getElementById('display-timer').textContent = format;
  }

  function setManualTime() {
    const val = document.getElementById('manual-timer').value;
    const parts = val.split(':');
    if (parts.length === 2) {
      state.timeLeft = (parseInt(parts[0]) * 60) + parseInt(parts[1]);
      displayTime();
    }
  }

  function updateTournament(val) {
    document.getElementById('display-tournament').textContent = val.toUpperCase() || "MATCH";
  }

  function resizeLogos(size) {
    document.documentElement.style.setProperty('--logo-size', size + 'px');
    document.getElementById('size-label').textContent = size;
  }

  function rescaleImages(scale) {
    document.documentElement.style.setProperty('--img-scale', scale + '%');
    document.getElementById('zoom-label').textContent = scale;
  }

  function updateLogo(team, code) {
    document.getElementById(`img-logo-${team}`).src = `${code}.png`;
  }

  function updateName(team, val) {
    document.getElementById(`display-name-${team}`).textContent = val.toUpperCase() || `EQUIPE ${team.toUpperCase()}`;
    document.getElementById(`lbl-${team}`).textContent = val || `Equipe ${team.toUpperCase()}`;
  }

  function addScore(team, pts) {
    if(team === 'a') state.scoreA = Math.max(0, state.scoreA + pts);
    else state.scoreB = Math.max(0, state.scoreB + pts);
    renderScores();
  }

  function addFoul(team) {
    if(team === 'a') state.foulsA++; else state.foulsB++;
    document.getElementById('fouls-a-val').textContent = state.foulsA;
    document.getElementById('fouls-b-val').textContent = state.foulsB;
  }

  function renderScores() {
    document.getElementById('score-a').textContent = state.scoreA;
    document.getElementById('score-b').textContent = state.scoreB;
    state.history[state.quarter] = [state.scoreA, state.scoreB];
    updateQuarterDisplay();
  }

  function changeQuarter(q) {
    state.quarter = q;
    document.getElementById('display-quarter').textContent = q;
    if (!state.history[q]) state.history[q] = [state.scoreA, state.scoreB];
    updateQuarterDisplay();
  }

  function updateQuarterDisplay() {
    const container = document.getElementById('quarter-scores-display');
    container.innerHTML = '';
    Object.keys(state.history).forEach(k => {
      container.innerHTML += `<span class="quarter-chip">${k}: ${state.history[k][0]}-${state.history[k][1]}</span>`;
    });
  }

  updateLogo('a', 'HB');
  updateLogo('b', 'H4');
</script>
</body>
</html>
